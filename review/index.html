<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>강설옥 설렁탕 군자본점 - 리뷰 작성</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <!-- 헤더 -->
    <header class="text-center">
      <h1 class="restaurant-name">강설옥 설렁탕</h1>
      <p class="restaurant-sub">군자본점</p>
    </header>

    <!-- 이용 순서 안내 (리뷰 영역 위) -->
    <div class="guide-callout" role="note">
      <span class="guide-step"><span class="step-num">1</span>리뷰 복사</span>
      <span class="guide-arrow">&rarr;</span>
      <span class="guide-step"><span class="step-num">2</span>네이버 리뷰 쓰기</span>
      <span class="guide-arrow">&rarr;</span>
      <span class="guide-step"><span class="step-num">3</span>붙여넣기</span>
    </div>

    <!-- 메뉴 선택 -->
    <div class="menu-select">
      <p class="menu-select-label">주문한 메뉴를 선택해주세요</p>
      <p class="menu-select-hint">동일한 메뉴를 여러개 주문하면 한번만 선택하시면 됩니다.</p>
      <div class="menu-chips">
        <label class="menu-chip"><input type="checkbox" name="menu" value="설렁탕"><span>설렁탕</span></label>
        <label class="menu-chip"><input type="checkbox" name="menu" value="얼큰설렁탕"><span>얼큰설렁탕</span></label>
        <label class="menu-chip"><input type="checkbox" name="menu" value="도가니탕"><span>도가니탕</span></label>
        <label class="menu-chip"><input type="checkbox" name="menu" value="스지수육"><span>스지수육</span></label>
        <label class="menu-chip"><input type="checkbox" name="menu" value="차돌미니수육"><span>차돌미니수육</span></label>
        <label class="menu-chip"><input type="checkbox" name="menu" value="모둠수육"><span>모둠수육</span></label>
        <label class="menu-chip"><input type="checkbox" name="menu" value="메밀왕만두"><span>메밀왕만두</span></label>
      </div>
      <p id="menu-warning" class="menu-warning" style="display:none;">메뉴를 1개 이상 선택해주세요.</p>
      <button id="btn-generate" class="btn btn-generate btn-block btn-lg" onclick="generateReview()">리뷰 생성하기</button>
    </div>

    <!-- 리뷰 카드 -->
    <div class="review-card" id="review-card" style="display:none;">
      <p class="review-label">AI가 작성한 리뷰</p>
      <div id="review-text" class="review-text">
        <div class="loading-progress" id="loading">
          <div class="progress-number" id="progress-number">0%</div>
          <div class="progress-bar-wrap">
            <div class="progress-bar-fill" id="progress-bar"></div>
          </div>
          <p class="loading-text">리뷰를 생성하고 있습니다</p>
        </div>
        <div id="review-content" class="review-content" style="display:none;"></div>
        <div id="error-message" class="error-message" style="display:none;">
          <p>리뷰 생성에 실패했어요.</p>
          <button class="btn btn-outline-secondary btn-sm" onclick="generateReview()">다시 시도</button>
        </div>
      </div>
    </div>

    <p id="review-guide" class="review-guide" style="display:none;">AI 리뷰를 참고해서 여러분만의 리뷰를 작성해보세요</p>

    <!-- 버튼 영역 -->
    <div class="btn-area" id="btn-area" style="display:none;">
      <p id="quota-text" class="quota-text">남은 횟수: 3/3</p>
      <button id="btn-refresh" class="btn btn-outline-dark btn-block btn-lg" onclick="generateReview()">
        <span id="refresh-icon">&#x21bb;</span> 다른 리뷰 보기
      </button>

      <div class="btn-row">
        <button id="btn-copy" class="btn btn-dark btn-lg" onclick="copyReview()">
          리뷰 복사하기
        </button>
        <a id="btn-naver" class="btn btn-naver btn-lg" href="https://m.place.naver.com/restaurant/2049894629/review/visitor" target="_blank" rel="noopener">
          네이버에 리뷰 쓰기
        </a>
      </div>
      <div id="copy-feedback" class="copy-feedback" style="display:none;">복사되었습니다!</div>
    </div>

    <p class="photo-hint">음식 사진 📸 만 예쁘게 찍어서 복사한 리뷰를 붙여 넣어주세요.<br>영상 🎬 이면 더 좋아요 &#x1F618;</p>
  </div>

  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
